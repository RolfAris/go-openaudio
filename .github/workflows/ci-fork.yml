name: CI (Fork)

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  # Only run for fork PRs — same-repo PRs are handled by ci.yml
  test:
    if: github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Run unit tests
        run: |
          go test -v -count=1 -timeout=60s \
            ./pkg/core/... \
            ./pkg/lifecycle/... \
            ./pkg/rewards/... \
            ./pkg/common/...

      - name: Run mediorum unit tests
        run: |
          go test -v -count=1 -timeout=60s \
            ./pkg/mediorum/...
        env:
          NETWORK: test
