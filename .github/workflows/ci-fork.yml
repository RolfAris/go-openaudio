name: CI (Fork)

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  # Only run for fork PRs — same-repo PRs are handled by ci.yml
  test:
    if: github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: example
          POSTGRES_DB: mediorum_test
        ports:
          - 5454:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create mediorum test databases
        run: |
          for i in $(seq 1 9); do
            PGPASSWORD=example psql -h localhost -p 5454 -U postgres -c "CREATE DATABASE m$i"
          done

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Run unit tests
        run: |
          go test -v -count=1 -timeout=60s \
            ./pkg/core/... \
            ./pkg/lifecycle/... \
            ./pkg/rewards/... \
            ./pkg/common/...

      - name: Run mediorum unit tests
        run: |
          go test -v -count=1 -timeout=60s \
            ./pkg/mediorum/...
        env:
          NETWORK: test
