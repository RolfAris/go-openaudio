name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-push:
    uses: ./.github/workflows/docker-build.yml
    with:
      tag: ${{ github.sha }}
      ref: ${{ github.ref }}
      push: true
    secrets: inherit

  verify-explorer-assets:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pkg/explorer/assets
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: pkg/explorer/assets/package-lock.json

      - run: npm ci
      - run: npx postcss input.css -o /tmp/explorer-output.css --minify

  tag-edge:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-test-push
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag as edge
        run: |
          docker buildx imagetools create \
            -t openaudio/go-openaudio:edge \
            openaudio/go-openaudio:${{ github.sha }}
