syntax = "proto3";

package openaudio.v1;

option go_package = "github.com/OpenAudio/go-openaudio/pkg/api/openaudio/v1";

import "openaudio/v1/types.proto";

service Core {
  rpc SendTransaction(SendTransactionRequest) returns (SendTransactionResponse) {}
  rpc GetTransaction(GetTransactionRequest) returns (GetTransactionResponse) {}
  rpc StreamTransactions(StreamTransactionsRequest) returns (stream StreamTransactionsResponse) {}
  rpc GetBlock(GetBlockRequest) returns (GetBlockResponse) {}
  rpc GetBlocks(GetBlocksRequest) returns (GetBlocksResponse) {}
  rpc StreamBlocks(StreamBlocksRequest) returns (stream StreamBlocksResponse) {}
}

service Storage {
  rpc GetUploadURL(GetUploadURLRequest) returns (GetUploadURLResponse) {}
  rpc FinalizeUpload(FinalizeUploadRequest) returns (FinalizeUploadResponse) {}
  rpc GetUpload(GetUploadRequest) returns (GetUploadResponse) {}
  rpc StreamUpload(StreamUploadRequest) returns (stream StreamUploadResponse) {}
}

service DDEX {
  rpc GetERNMessage(GetERNMessageRequest) returns (GetERNMessageResponse) {}
  rpc GetERNThread(GetERNThreadRequest) returns (GetERNThreadResponse) {}
  rpc GetERNEvents(GetERNEventsRequest) returns (GetERNEventsResponse) {}
}

service Validator {
  rpc GetAttestation(GetAttestationRequest) returns (GetAttestationResponse) {}
}

service P2P {
  rpc Stream(stream StreamRequest) returns (stream StreamResponse) {}
}

service System {
  rpc GetHealth(GetHealthRequest) returns (GetHealthResponse) {}
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse) {}
}
